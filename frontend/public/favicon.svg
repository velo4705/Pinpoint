<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for Gradients and Glows -->
  <defs>
    <!-- Background Radial Glow (Adjusted for high-contrast tiny rendering) -->
    <radialGradient id="fav-bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0055" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Premium 3D Red Gradient -->
    <linearGradient id="fav-pin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff387d"/>
      <stop offset="40%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#80000a"/>
    </linearGradient>

    <!-- Glowing Core Lens -->
    <radialGradient id="fav-inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ff4757" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0"/>
    </radialGradient>

    <!-- Glowing Drop Shadow Filter (Optimized for bookmark circles and browser tabs) -->
    <filter id="fav-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#ff0055" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Large Radial Background Glow to pop in dark mode tabs -->
  <circle cx="256" cy="256" r="220" fill="url(#fav-bg-glow)"/>

  <!-- THE PERFECTLY CENTERED LOCATOR PIN -->
  <g filter="url(#fav-glow)">
    <!-- 1. Metallic Outer Bevel / 3D Shield -->
    <path d="M 256,430 
             C 244,414 136,276 136,196 
             A 120,120 0 0,1 376,196 
             C 376,276 268,414 256,430 Z" 
          fill="url(#fav-pin-grad)" 
          stroke="#ffffff" 
          stroke-width="6"
          stroke-opacity="0.9"/>
          
    <!-- 2. Dark Chamber Core -->
    <circle cx="256" cy="196" r="54" fill="#0c0d12" stroke="#ffffff" stroke-width="3" stroke-opacity="0.8"/>
    
    <!-- 3. Neon Red Glowing Lens -->
    <circle cx="256" cy="196" r="46" fill="url(#fav-inner-glow)"/>
    
    <!-- 4. High-contrast Target Crosshair -->
    <circle cx="256" cy="196" r="28" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.9"/>
    
    <!-- 5. Optical Laser Pointer Dot -->
    <circle cx="256" cy="196" r="6.5" fill="#ffffff"/>
  </g>
</svg>
